<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aegis — SSH defense</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7e9ea;
      --muted: #8b98a5;
      --accent: #1d9bf0;
      --warn: #f4212e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page {
      width: 100%;
      max-width: 52rem;
      margin-top: auto;
      margin-bottom: auto;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.25rem 0;
    }
    .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .grid {
      display: grid;
      gap: 1rem;
    }
    @media (min-width: 640px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    section {
      background: var(--panel);
      border-radius: 8px;
      padding: 1rem 1.1rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    section h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 0.75rem 0;
      font-weight: 600;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      font-family: ui-monospace, monospace;
      font-size: 0.85rem;
    }
    li {
      padding: 0.35rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    li:last-child { border-bottom: none; }
    .ip { color: var(--accent); }
    .empty { color: var(--muted); font-style: italic; }
    .meta {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .meta code { color: var(--text); }
    #status { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
    .err { color: var(--warn); }
    .header-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .header-row img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .header-row .titles { min-width: 0; }
    .header-row .sub { margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="page">
    <header class="header-row">
      <!-- Image file lives next to aegis.html; swap src for your own PNG/JPG/WebP/SVG -->
      <img src="/aegis-logo.svg" width="56" height="56" alt="" />
      <div class="titles">
        <h1>Aegis</h1>
        <p class="sub">Local dashboard — failed SSH attempts and UFW blocks</p>
      </div>
    </header>
    <p id="status">Connecting…</p>
    <div class="grid">
      <section>
        <h2>Blocked (UFW)</h2>
        <ul id="blocked"></ul>
      </section>
      <section>
        <h2>Recent failures</h2>
        <ul id="failures"></ul>
      </section>
    </div>
    <p class="meta">
      Log: <code id="logpath">—</code> ·
      Threshold: <code id="thr">—</code> in <code id="win">—</code>s
    </p>
  </div>

  <script>
    function fmtTime(t) {
      if (t == null) return "";
      const d = new Date(t * 1000);
      return d.toLocaleTimeString();
    }

    function setList(el, items, emptyMsg, rowFn) {
      el.innerHTML = "";
      if (!items || items.length === 0) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = emptyMsg;
        el.appendChild(li);
        return;
      }
      for (const item of items) {
        const li = document.createElement("li");
        li.innerHTML = rowFn(item);
        el.appendChild(li);
      }
    }

    async function poll() {
      const statusEl = document.getElementById("status");
      try {
        const r = await fetch("/api/status");
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        statusEl.textContent = "Live · " + fmtTime(data.now);
        statusEl.className = "";

        document.getElementById("logpath").textContent = data.log || "—";
        document.getElementById("thr").textContent = data.threshold ?? "—";
        document.getElementById("win").textContent = data.window ?? "—";

        setList(
          document.getElementById("blocked"),
          data.blocked,
          "No blocks yet",
          (b) => `<span class="ip">${b.ip}</span> · ${fmtTime(b.t)}`
        );
        setList(
          document.getElementById("failures"),
          data.recent_failures,
          "No failed attempts seen",
          (f) => `<span class="ip">${f.ip}</span> · ${fmtTime(f.t)}`
        );
      } catch (e) {
        statusEl.textContent = "Could not reach Aegis API — is aegis-view.py running?";
        statusEl.className = "err";
      }
    }

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
